name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  headless-test:
    name: Headless integration test (macOS)
    runs-on: macos-latest          # 3-core Apple silicon, free for public repos
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run unit + headless integration tests
        run: ./gradlew core:test core:integrationTest --no-daemon --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-report
          path: core/build/reports/tests/integrationTest
          if-no-files-found: ignore

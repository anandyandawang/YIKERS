name: CI

on:
  push:
    branches: [main]   # post-merge / direct-to-main only; PR branches run via pull_request
  pull_request:        # all PR branches: re-runs on each push (synchronize), covers forks
  workflow_dispatch:

jobs:
  # Unit + integration run as separate parallel jobs (matrix), each with its own
  # Gradle task + uploaded report. fail-fast off so one failing set never cancels
  # the other -> both signals always land.
  test:
    name: ${{ matrix.name }} tests (macOS)
    runs-on: macos-latest          # 3-core Apple silicon, free for public repos
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            task: core:test
            report: core/build/reports/tests/test
          - name: integration
            task: core:integrationTest
            report: core/build/reports/tests/integrationTest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run ${{ matrix.name }} tests
        run: ./gradlew ${{ matrix.task }} --no-daemon --stacktrace

      - name: Upload ${{ matrix.name }} test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-test-report
          path: ${{ matrix.report }}
          if-no-files-found: ignore
